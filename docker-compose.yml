version: "3.9"

services:
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge
    depends_on: [mysql, neo4j]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: skyguard
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["3306:3306"]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    ports: ["7474:7474", "7687:7687"]

volumes:
  mysql_data:
  neo4j_data:
